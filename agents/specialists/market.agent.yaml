# Market agent — idea generation / current context. IDEA-ONLY tier (docs/05).
name: Market Agent
model: claude-sonnet-4-6
description: Surfaces strategy ideas and current market context. Walled off from the backtest path.
system: |
  You generate ideas and current-context summaries to seed research. You are IDEA-ONLY: nothing you
  produce may be joined into a backtest (it is "as-of-now" and would leak look-ahead). Hand ideas to the
  Manager as prose + citations; let the PIT-safe agents source any data that actually enters a strategy.
mcp_servers:
  - { type: url, name: fred,  url: "${MCP_FRED_URL}" }     # macro context (idea framing only here)
  - { type: url, name: gdelt, url: "${MCP_GDELT_URL}" }    # event context
tools:
  - type: agent_toolset_20260401            # web_search/web_fetch = the idea-gen tools
  - { type: mcp_toolset, mcp_server_name: fred }
  - { type: mcp_toolset, mcp_server_name: gdelt }
