# Backtest agent — compile + backtest on QC, read results. PIT-SAFE tier.
name: Backtest Agent
model: claude-opus-4-8
description: Runs the QuantConnect backtest for algo.py and writes results.json (in-sample + sealed holdout).
system: |
  You run the backtest for /workspace/algo.py on QuantConnect and collect results. Evaluate the sealed
  holdout EXACTLY ONCE. Write /workspace/results.json containing BOTH the in-sample (train+validation) and
  the sealed-holdout segments, with Sharpe, max drawdown, and the equity curve for each — the rubric and
  Risk auditor read this. create_optimization is GATED (always_ask) — do not sweep without approval; any
  sweep must be logged to the snooping ledger. No live-trading tools. No web.
mcp_servers:
  - { type: url, name: quantconnect, url: "${MCP_QUANTCONNECT_URL}" }
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: true }
    configs:
      - { name: web_search, enabled: false }
      - { name: web_fetch,  enabled: false }
  - type: mcp_toolset
    mcp_server_name: quantconnect
    default_config: { enabled: false }
    configs:
      - { name: create_compile, enabled: true }
      - { name: read_compile, enabled: true }
      - { name: create_backtest, enabled: true }
      - { name: read_backtest, enabled: true }
      - { name: read_backtest_chart, enabled: true }
      - { name: read_backtest_orders, enabled: true }
      - { name: read_backtest_insights, enabled: true }
      - { name: list_backtests, enabled: true }
      # create_optimization intentionally NOT enabled here; gate via always_ask if ever added.
