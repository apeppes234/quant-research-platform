# Standalone compose for the QuantConnect MCP + auth proxy (also folded into the root docker-compose.yml).
# QC creds are env (not vault); only the proxy is published. See README.md + docs/04 + docs/12.
services:
  qc-mcp:
    image: quantconnect/mcp-server
    environment:
      MCP_TRANSPORT: streamable-http
      QUANTCONNECT_USER_ID: ${QUANTCONNECT_USER_ID}
      QUANTCONNECT_API_TOKEN: ${QUANTCONNECT_API_TOKEN}
    expose: ["8000"]            # internal only

  qc-proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
    environment:
      QC_MCP_INBOUND_BEARER: ${QC_MCP_INBOUND_BEARER}
    ports: ["9002:443"]         # publish ONLY the proxy (front this with real TLS in prod)
    depends_on: [qc-mcp]
